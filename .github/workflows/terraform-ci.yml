name: Terraform CI & Security Scan

# main / master ブランチへの push と PR 時に実行
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  id-token: write      # OIDC トークン取得（AWS 認証）
  contents: read       # リポジトリ読み取り
  pull-requests: write # PR へのコメント投稿

jobs:
  terraform:
    name: Fmt / Validate / Plan
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    defaults:
      run:
        working-directory: terraform

    steps:
      # ── 1. ソースコード取得 ────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Terraform セットアップ ─────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      # ── 3. フォーマットチェック（AWS 不要）────────────────
      - name: Terraform Format
        run: terraform fmt --check -recursive

      # ── 4. 初期化（バックエンドなし）─────────────────────
      - name: Terraform Init
        run: terraform init -backend=false

      # ── 5. 構文・設定バリデーション（AWS 不要）───────────
      - name: Terraform Validate
        run: terraform validate

      # ── 6. AWS 認証（OIDC / AWS_ROLE_ARN が設定済みの場合）
      - name: Configure AWS credentials
        if: vars.AWS_ROLE_ARN != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ap-northeast-1

      # ── 7. Terraform Plan（AWS_ROLE_ARN が設定済みの場合）
      - name: Terraform Plan
        if: vars.AWS_ROLE_ARN != ''
        id: plan
        run: |
          terraform plan \
            -no-color \
            -input=false
        continue-on-error: true

      # ── 7. Plan 結果を PR にコメント ──────────────────────
      - name: Comment Plan on PR
        if: github.event_name == 'pull_request' && vars.AWS_ROLE_ARN != ''
        uses: actions/github-script@v7
        with:
          script: |
            const plan = `${{ steps.plan.outputs.stdout }}`;
            const status = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';
            const body = [
              `### ${status} Terraform Plan`,
              '```hcl',
              plan.substring(0, 60000),
              '```',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  security:
    name: Checkov セキュリティスキャン
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: terraform
          soft_fail: false
          skip_check: >-
            CKV_AWS_2,CKV_AWS_26,CKV_AWS_27,
            CKV_AWS_79,CKV_AWS_91,CKV_AWS_103,
            CKV_AWS_118,CKV_AWS_126,CKV_AWS_129,
            CKV_AWS_131,CKV_AWS_135,CKV_AWS_150,
            CKV_AWS_158,CKV_AWS_161,CKV_AWS_226,
            CKV_AWS_231,CKV_AWS_260,CKV_AWS_290,
            CKV_AWS_293,CKV_AWS_338,CKV_AWS_355,
            CKV_AWS_378,CKV_AWS_382,CKV2_AWS_1,
            CKV2_AWS_12,CKV2_AWS_19,CKV2_AWS_20,
            CKV2_AWS_28,CKV2_AWS_60,CKV2_AWS_69
          output_format: cli
