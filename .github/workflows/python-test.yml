name: Python Test

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/python-test.yml"
  pull_request:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/python-test.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Python テスト・Lint
    runs-on: ubuntu-latest

    steps:
      # ── 1. ソースコード取得 ──────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v7

      # ── 2. Python セットアップ ───────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"

      # ── 3. 依存パッケージインストール ────────────────────────
      - name: Install dependencies
        run: pip install pytest pytest-cov ruff

      # ── 4. Ruff（Lint）───────────────────────────────────────
      - name: Ruff lint
        run: ruff check scripts/

      # ── 5. pytest 実行 ───────────────────────────────────────
      - name: Pytest
        run: pytest scripts/test_validate_config.py -v --cov=scripts --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: python
          fail_ci_if_error: false

      # ── 6. スクリプト動作確認（正常終了チェック）────────────
      - name: Validate config (smoke test)
        run: python scripts/validate_config.py --dir terraform/
