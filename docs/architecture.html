<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AWS 3-Tier Web Architecture (Terraform)</title>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@700;900&family=JetBrains+Mono:wght@400;700&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #08121E;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
  }
  .wrap {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  svg { width: 100%; height: 100%; display: block; }
  text { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .title { font-family: 'Big Shoulders Display', sans-serif; font-weight: 900; letter-spacing: .02em; }
  .label { font-family: 'IBM Plex Mono', monospace; font-weight: 700; }
  .sub   { font-family: 'JetBrains Mono', monospace; font-weight: 400; }
  .stack { font-family: 'IBM Plex Mono', monospace; font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">
<!--
  Coordinate system mirrors the Python script: 16 × 9 world units.
  SVG viewBox uses 100 px per world unit so we can reuse all node/edge
  coordinates directly. Y is flipped (SVG y grows downward) via
  yS = (9 - yWorld) * 100.
-->
<svg viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Arrowheads (one per stroke color) -->
    <marker id="ah-cobalt"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3D8EF0"/></marker>
    <marker id="ah-cobalt2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#93C5FD"/></marker>
    <marker id="ah-teal"    viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#22D3EE"/></marker>
    <marker id="ah-orange"  viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#F59E00"/></marker>
    <marker id="ah-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#10B981"/></marker>
    <marker id="ah-pink"    viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#F472B6"/></marker>
    <marker id="ah-amber"   viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#F59E0B"/></marker>

    <!-- Dot pattern for subtle grid -->
    <pattern id="dots" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="0.9" fill="#162840" opacity="0.6"/>
    </pattern>
  </defs>

  <!-- Background + dot grid -->
  <rect x="0" y="0" width="1600" height="900" fill="#08121E"/>
  <rect x="50" y="50" width="1500" height="800" fill="url(#dots)"/>

  <!-- ============== TIER BANDS ============== -->
  <!-- 図全体を右にシフト -->
  <g transform="translate(80, 0)">
  <!-- Helper: world(x,y) → svg(x*100, (9-y)*100) -->

  <!-- INTERNET band: yWorld 7.55–8.52 → ySVG 148..245 -->
  <g>
    <rect x="112" y="48"  width="1116" height="97" fill="#0E2035" opacity="0.55"/>
    <rect x="112" y="48"  width="1116" height="97" fill="none" stroke="#3D8EF0" stroke-width="0.55" stroke-dasharray="7 5" opacity="0.32"/>
    <line x1="112" y1="54" x2="112" y2="139" stroke="#3D8EF0" stroke-width="2.8" opacity="0.55"/>
    <text x="89" y="100" text-anchor="middle" font-size="10" fill="#93C5FD" opacity="0.85" class="label">INTERNET</text>
  </g>
  <!-- PUBLIC SUBNET band: 5.75–7.48 → 152..325 -->
  <g>
    <rect x="112" y="152" width="1116" height="173" fill="#1C1400" opacity="0.55"/>
    <rect x="112" y="152" width="1116" height="173" fill="none" stroke="#F59E00" stroke-width="0.55" stroke-dasharray="7 5" opacity="0.32"/>
    <line x1="112" y1="158" x2="112" y2="319" stroke="#F59E00" stroke-width="2.8" opacity="0.55"/>
    <text x="89" y="231" text-anchor="middle" font-size="10" fill="#FCD34D" opacity="0.85" class="label">PUBLIC</text>
    <text x="89" y="249" text-anchor="middle" font-size="10" fill="#FCD34D" opacity="0.85" class="label">SUBNET</text>
  </g>
  <!-- PRIVATE APP: 3.30–5.68 → 332..570 -->
  <g>
    <rect x="112" y="332" width="1116" height="238" fill="#160C2C" opacity="0.55"/>
    <rect x="112" y="332" width="1116" height="238" fill="none" stroke="#8B5CF6" stroke-width="0.55" stroke-dasharray="7 5" opacity="0.32"/>
    <line x1="112" y1="338" x2="112" y2="564" stroke="#8B5CF6" stroke-width="2.8" opacity="0.55"/>
    <text x="89" y="442" text-anchor="middle" font-size="10" fill="#C4B5FD" opacity="0.85" class="label">PRIVATE</text>
    <text x="89" y="460" text-anchor="middle" font-size="10" fill="#C4B5FD" opacity="0.85" class="label">APP</text>
  </g>
  <!-- PRIVATE DB: 0.65–3.22 → 578..835 -->
  <g>
    <rect x="112" y="578" width="1116" height="257" fill="#071A10" opacity="0.55"/>
    <rect x="112" y="578" width="1116" height="257" fill="none" stroke="#10B981" stroke-width="0.55" stroke-dasharray="7 5" opacity="0.32"/>
    <line x1="112" y1="584" x2="112" y2="829" stroke="#10B981" stroke-width="2.8" opacity="0.55"/>
    <text x="89" y="697" text-anchor="middle" font-size="10" fill="#6EE7B7" opacity="0.85" class="label">PRIVATE</text>
    <text x="89" y="715" text-anchor="middle" font-size="10" fill="#6EE7B7" opacity="0.85" class="label">DB</text>
  </g>

  <!-- ============== TITLE ============== -->
  <rect x="145" y="6" width="1155" height="52" rx="6" fill="#0A1828" stroke="#8B5CF6" stroke-width="1.1"/>
  <text x="722" y="32" text-anchor="middle" font-size="22" fill="#E2E8F0" class="title" dominant-baseline="middle">AWS 3-TIER WEB ARCHITECTURE</text>
  <text x="722" y="49" text-anchor="middle" font-size="10" fill="#64748B" class="sub">VPC  |  ALB  |  EC2 x2  |  RDS Multi-AZ  |  SNS / SQS  |  Terraform IaC</text>

  <!-- AZ split dashed line (vertical through middle of app tier) -->
  <line x1="670" y1="338" x2="670" y2="566" stroke="#8B5CF6" stroke-width="0.7" stroke-dasharray="6 4" opacity="0.32"/>
  <text x="420" y="348" text-anchor="middle" font-size="11" fill="#C4B5FD" opacity="0.55" class="label">AZ - a</text>
  <text x="920" y="348" text-anchor="middle" font-size="11" fill="#C4B5FD" opacity="0.55" class="label">AZ - c</text>

  <!-- ============== ARROWS (BEHIND nothing; drawn after nodes to stay on top like zorder=10) ============== -->
  <!-- Nodes need to be drawn before arrows, but arrows on top. Do nodes first: -->

  <!-- INTERNET: cx=670 (aligned with ALB & RDS) -->
  <g>
    <rect x="496" y="60"  width="348" height="72" rx="9" fill="#3D8EF0" opacity="0.09"/>
    <rect x="503" y="67"  width="334" height="58" rx="7" fill="#3D8EF0" opacity="0.07"/>
    <rect x="510" y="74"  width="320" height="44" rx="7" fill="#0C1C30" stroke="#3D8EF0" stroke-width="1.9"/>
    <text x="670" y="92"  text-anchor="middle" font-size="12.5" fill="#3D8EF0" class="label">INTERNET</text>
    <text x="670" y="110" text-anchor="middle" font-size="9" fill="#64748B" class="sub">User Traffic</text>
  </g>

  <!-- IGW: cx=235 (symmetric around ALB cx=670) -->
  <g>
    <rect x="131" y="190" width="208" height="100" rx="9" fill="#93C5FD" opacity="0.09"/>
    <rect x="138" y="197" width="194" height="86" rx="7" fill="#93C5FD" opacity="0.07"/>
    <rect x="145" y="204" width="180" height="72" rx="7" fill="#0C1C30" stroke="#93C5FD" stroke-width="1.9"/>
    <text x="235" y="234" text-anchor="middle" font-size="12.5" fill="#93C5FD" class="label">IGW</text>
    <text x="235" y="254" text-anchor="middle" font-size="9" fill="#64748B" class="sub">Internet GW</text>
  </g>

  <!-- ALB: cx=670 (aligned with INTERNET & RDS) -->
  <g>
    <rect x="511" y="190" width="318" height="100" rx="9" fill="#F59E00" opacity="0.09"/>
    <rect x="518" y="197" width="304" height="86" rx="7" fill="#F59E00" opacity="0.07"/>
    <rect x="525" y="204" width="290" height="72" rx="7" fill="#0C1C30" stroke="#F59E00" stroke-width="1.9"/>
    <text x="670" y="234" text-anchor="middle" font-size="12.5" fill="#F59E00" class="label">ALB</text>
    <text x="670" y="254" text-anchor="middle" font-size="9" fill="#64748B" class="sub">App Load Balancer</text>
  </g>

  <!-- NAT GW: cx=1105 (symmetric partner of IGW around ALB cx=670) -->
  <g>
    <rect x="1001" y="190" width="208" height="100" rx="9" fill="#22D3EE" opacity="0.09"/>
    <rect x="1008" y="197" width="194" height="86" rx="7" fill="#22D3EE" opacity="0.07"/>
    <rect x="1015" y="204" width="180" height="72" rx="7" fill="#0C1C30" stroke="#22D3EE" stroke-width="1.9"/>
    <text x="1105" y="234" text-anchor="middle" font-size="12.5" fill="#22D3EE" class="label">NAT GW</text>
    <text x="1105" y="254" text-anchor="middle" font-size="9" fill="#64748B" class="sub">Egress Only</text>
  </g>

  <!-- EC2-1: cx=4.2, cy=4.62, w=2.7, h=0.85 → x=285, y=395.5, w=270, h=85 -->
  <g>
    <rect x="271" y="381.5" width="298" height="113" rx="9" fill="#8B5CF6" opacity="0.09"/>
    <rect x="278" y="388.5" width="284" height="99" rx="7" fill="#8B5CF6" opacity="0.07"/>
    <rect x="285" y="395.5" width="270" height="85" rx="7" fill="#0C1C30" stroke="#8B5CF6" stroke-width="1.9"/>
    <text x="420" y="426" text-anchor="middle" font-size="12.5" fill="#8B5CF6" class="label">EC2-1</text>
    <text x="420" y="446" text-anchor="middle" font-size="9" fill="#64748B" class="sub">Apache  /  t3.micro</text>
  </g>

  <!-- EC2-2: cx=9.2, cy=4.62 → x=785, y=395.5, w=270, h=85 -->
  <g>
    <rect x="771" y="381.5" width="298" height="113" rx="9" fill="#8B5CF6" opacity="0.09"/>
    <rect x="778" y="388.5" width="284" height="99" rx="7" fill="#8B5CF6" opacity="0.07"/>
    <rect x="785" y="395.5" width="270" height="85" rx="7" fill="#0C1C30" stroke="#8B5CF6" stroke-width="1.9"/>
    <text x="920" y="426" text-anchor="middle" font-size="12.5" fill="#8B5CF6" class="label">EC2-2</text>
    <text x="920" y="446" text-anchor="middle" font-size="9" fill="#64748B" class="sub">Apache  /  t3.micro</text>
  </g>

  <!-- SNS: cx=3.2, cy=1.96, w=2.1, h=0.78 → x=215, y=665, w=210, h=78 -->
  <g>
    <rect x="201" y="651" width="238" height="106" rx="9" fill="#F472B6" opacity="0.09"/>
    <rect x="208" y="658" width="224" height="92" rx="7" fill="#F472B6" opacity="0.07"/>
    <rect x="215" y="665" width="210" height="78" rx="7" fill="#0C1C30" stroke="#F472B6" stroke-width="1.9"/>
    <text x="320" y="696" text-anchor="middle" font-size="12.5" fill="#F472B6" class="label">SNS</text>
    <text x="320" y="716" text-anchor="middle" font-size="9" fill="#64748B" class="sub">Notifications</text>
  </g>

  <!-- RDS: cx=6.7, cy=1.96, w=2.9, h=0.78 → x=525, y=665, w=290, h=78 -->
  <g>
    <rect x="511" y="651" width="318" height="106" rx="9" fill="#10B981" opacity="0.09"/>
    <rect x="518" y="658" width="304" height="92" rx="7" fill="#10B981" opacity="0.07"/>
    <rect x="525" y="665" width="290" height="78" rx="7" fill="#0C1C30" stroke="#10B981" stroke-width="1.9"/>
    <text x="670" y="696" text-anchor="middle" font-size="12.5" fill="#10B981" class="label">RDS MySQL</text>
    <text x="670" y="716" text-anchor="middle" font-size="9" fill="#64748B" class="sub">Multi-AZ  db.t3.micro</text>
  </g>

  <!-- SQS: cx=10.2, cy=1.96 → x=915, y=665, w=210, h=78 -->
  <g>
    <rect x="901" y="651" width="238" height="106" rx="9" fill="#F59E0B" opacity="0.09"/>
    <rect x="908" y="658" width="224" height="92" rx="7" fill="#F59E0B" opacity="0.07"/>
    <rect x="915" y="665" width="210" height="78" rx="7" fill="#0C1C30" stroke="#F59E0B" stroke-width="1.9"/>
    <text x="1020" y="696" text-anchor="middle" font-size="12.5" fill="#F59E0B" class="label">SQS</text>
    <text x="1020" y="716" text-anchor="middle" font-size="9" fill="#64748B" class="sub">Message Bus</text>
  </g>

  <!-- ============== ARROWS (on top, z-order equivalent) ============== -->
  <!-- Edge coords (corrected):
       INTERNET bottom-C = (670, 118)  bottom-L=(510,118)  bottom-R=(830,118)
       IGW top=(235,204)  right=(325,240)
       ALB top=(670,204)  bL=(555,276)  bR=(785,276)
       NAT GW top=(1105,204)
       EC2-1 top=(420,395.5) bot=(420,480.5) left=(285,462)
       EC2-2 top=(920,395.5) bot=(920,480.5) right=(1055,462)
       SNS top=(320,665) right=(425,704)
       RDS top-L=(555,665) top-R=(785,665)
       SQS top=(1020,665) left=(915,704)
  -->

  <!-- 1) INTERNET → ALB (HTTPS), vertical at x=670 -->
  <line x1="670" y1="118" x2="670" y2="204" stroke="#3D8EF0" stroke-width="1.8" marker-end="url(#ah-cobalt)"/>
  <text x="690" y="165" font-size="10" fill="#3D8EF0" class="sub">HTTPS</text>

  <!-- 2) INTERNET → IGW: INTERNET bottom-L (510,118) → IGW top (235,204) -->
  <path d="M 510,118 C 420,130 290,160 235,204" fill="none" stroke="#93C5FD" stroke-width="1.6" marker-end="url(#ah-cobalt2)"/>

  <!-- 3) NAT GW → INTERNET (egress, dashed): NAT GW top (1105,204) → INTERNET bottom-R (830,118) -->
  <path d="M 1105,204 C 1050,160 920,130 830,118" fill="none" stroke="#22D3EE" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#ah-teal)"/>
  <text x="970" y="145" font-size="10" fill="#22D3EE" class="sub">Egress</text>

  <!-- 4) ALB bottom-left (525,276) → EC2-1 top (420,395.5) -->
  <path d="M 525,276 C 480,310 440,350 420,395.5" fill="none" stroke="#F59E00" stroke-width="1.8" marker-end="url(#ah-orange)"/>
  <text x="415" y="335" text-anchor="end" font-size="10" fill="#F59E00" class="sub">Round Robin</text>

  <!-- 5) ALB bottom-right (815,276) → EC2-2 top (920,395.5) -->
  <path d="M 815,276 C 860,310 900,350 920,395.5" fill="none" stroke="#F59E00" stroke-width="1.8" marker-end="url(#ah-orange)"/>

  <!-- 6) EC2-1 bottom ↔ RDS top-left (MySQL:3306), bidirectional via two arrows -->
  <path d="M 420,480.5 C 470,560 510,620 555,665" fill="none" stroke="#10B981" stroke-width="1.8" marker-end="url(#ah-emerald)"/>
  <path d="M 555,665 C 510,620 470,560 420,480.5" fill="none" stroke="#10B981" stroke-width="1.8" marker-end="url(#ah-emerald)"/>
  <text x="440" y="580" text-anchor="end" font-size="10" fill="#10B981" class="sub">MySQL:3306</text>

  <!-- 7) EC2-2 bottom ↔ RDS top-right -->
  <path d="M 920,480.5 C 870,560 830,620 785,665" fill="none" stroke="#10B981" stroke-width="1.8" marker-end="url(#ah-emerald)"/>
  <path d="M 785,665 C 830,620 870,560 920,480.5" fill="none" stroke="#10B981" stroke-width="1.8" marker-end="url(#ah-emerald)"/>

  <!-- 8) EC2-1 left → SNS top (cron / 1m), curves outward (left side) -->
  <path d="M 285,462 C 230,540 260,620 320,665" fill="none" stroke="#F472B6" stroke-width="1.8" marker-end="url(#ah-pink)"/>
  <text x="218" y="585" text-anchor="middle" font-size="10" fill="#F472B6" class="sub">cron / 1m</text>

  <!-- 9) SNS → SQS (Subscription) ★ RDS を貫通しないよう下側に大きく迂回 -->
  <!-- SNS right (425, 704) → SQS left (915, 704), detour DOWN under RDS (y up to ~790) -->
  <path d="M 425,704 C 520,810 820,810 915,704" fill="none" stroke="#F59E0B" stroke-width="1.8" marker-end="url(#ah-amber)"/>
  <text x="670" y="800" text-anchor="middle" font-size="10" fill="#F59E0B" class="sub">Subscription</text>

  <!-- 10) SQS top → EC2-2 right (Polling) -->
  <path d="M 1020,665 C 1080,600 1090,520 1055,462" fill="none" stroke="#F59E0B" stroke-width="1.8" marker-end="url(#ah-amber)"/>
  <text x="1110" y="580" font-size="10" fill="#F59E0B" class="sub">Polling</text>
  </g>
  <!-- /center diagram shift -->

  <!-- ============== RIGHT STACK PANEL ============== -->
  <!-- PX=13.2 (world) → x=1320, panel size 272×826 → x=1308,y=6,w=272,h=826 -->
  <rect x="1308" y="6" width="272" height="826" rx="10" fill="#091627" stroke="#8B5CF6" stroke-width="1.1"/>
  <text x="1444" y="38" text-anchor="middle" font-size="14" fill="#E2E8F0" class="stack">STACK</text>
  <line x1="1316" y1="48" x2="1580" y2="48" stroke="#8B5CF6" stroke-width="0.9" opacity="0.65"/>

  <!-- Stack items: iy_world = 8.18 - i*0.72; ySVG = (9 - iy_world)*100 = (0.82 + 0.72*i)*100 = 82 + 72*i -->
  <g font-family="'IBM Plex Mono', monospace">
    <!-- 0 Terraform -->
    <circle cx="1346" cy="82" r="5.7" fill="#8B5CF6"/>
    <text x="1370" y="76"  font-size="11" fill="#8B5CF6" class="stack">Terraform</text>
    <text x="1370" y="92"  font-size="9"  fill="#64748B" class="sub">IaC modules</text>
    <!-- 1 VPC -->
    <circle cx="1346" cy="154" r="5.7" fill="#3D8EF0"/>
    <text x="1370" y="148" font-size="11" fill="#3D8EF0" class="stack">VPC</text>
    <text x="1370" y="164" font-size="9"  fill="#64748B" class="sub">2 AZ split</text>
    <!-- 2 ALB -->
    <circle cx="1346" cy="226" r="5.7" fill="#F59E00"/>
    <text x="1370" y="220" font-size="11" fill="#F59E00" class="stack">ALB</text>
    <text x="1370" y="236" font-size="9"  fill="#64748B" class="sub">Layer 7 LB</text>
    <!-- 3 EC2 x2 -->
    <circle cx="1346" cy="298" r="5.7" fill="#C4B5FD"/>
    <text x="1370" y="292" font-size="11" fill="#C4B5FD" class="stack">EC2  x2</text>
    <text x="1370" y="308" font-size="9"  fill="#64748B" class="sub">t3.micro / Apache</text>
    <!-- 4 RDS -->
    <circle cx="1346" cy="370" r="5.7" fill="#10B981"/>
    <text x="1370" y="364" font-size="11" fill="#10B981" class="stack">RDS MySQL</text>
    <text x="1370" y="380" font-size="9"  fill="#64748B" class="sub">Multi-AZ failover</text>
    <!-- 5 SNS+SQS -->
    <circle cx="1346" cy="442" r="5.7" fill="#F59E0B"/>
    <text x="1370" y="436" font-size="11" fill="#F59E0B" class="stack">SNS + SQS</text>
    <text x="1370" y="452" font-size="9"  fill="#64748B" class="sub">Async messaging</text>
    <!-- 6 IAM/SG -->
    <circle cx="1346" cy="514" r="5.7" fill="#EF4444"/>
    <text x="1370" y="508" font-size="11" fill="#EF4444" class="stack">IAM / SG</text>
    <text x="1370" y="524" font-size="9"  fill="#64748B" class="sub">Least-privilege</text>
    <!-- 7 SSM -->
    <circle cx="1346" cy="586" r="5.7" fill="#22D3EE"/>
    <text x="1370" y="580" font-size="11" fill="#22D3EE" class="stack">SSM Mgr</text>
    <text x="1370" y="596" font-size="9"  fill="#64748B" class="sub">SSH-less ops</text>
    <!-- 8 EBS -->
    <circle cx="1346" cy="658" r="5.7" fill="#6EE7B7"/>
    <text x="1370" y="652" font-size="11" fill="#6EE7B7" class="stack">EBS Enc</text>
    <text x="1370" y="668" font-size="9"  fill="#64748B" class="sub">Encrypted EBS</text>
    <!-- 9 GitHub CI -->
    <circle cx="1346" cy="730" r="5.7" fill="#93C5FD"/>
    <text x="1370" y="724" font-size="11" fill="#93C5FD" class="stack">GitHub CI</text>
    <text x="1370" y="740" font-size="9"  fill="#64748B" class="sub">fmt/validate/plan</text>
  </g>

  <!-- Terraform IaC badge -->
  <rect x="1316" y="772" width="242" height="50" rx="6" fill="#1E1B4B" stroke="#8B5CF6" stroke-width="1.0"/>
